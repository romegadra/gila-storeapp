spring:
  application:
    name: storeapp
  datasource:
    url: ${STOREAPP_DB_URL:jdbc:h2:mem:storeapp;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
    driver-class-name: ${STOREAPP_DB_DRIVER:org.h2.Driver}
    username: ${STOREAPP_DB_USER:sa}
    password: ${STOREAPP_DB_PASSWORD:}
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

app:
  csv:
    seed-path: ${STOREAPP_SEED_CSV:products.csv}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
